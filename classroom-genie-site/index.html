<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Genie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://unpkg.com/html-to-docx@1.8.0/dist/html-to-docx.js"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to bottom, #fbe9f2, #f8fafc);
        }
        .prose { max-width: 65ch; }
        .prose-sm { font-size: 0.875rem; line-height: 1.5; }
        @media print {
            body * { visibility: hidden; }
            #printable-plan, #printable-plan *,
            #printable-report, #printable-report *,
            #printable-test, #printable-test * { visibility: visible; }
            #printable-plan, #printable-report, #printable-test {
                position: absolute; left: 0; top: 0; width: 100%; padding: 1rem; border: none;
            }
            .print-only-title { display: block !important; text-align: center; margin-bottom: 2rem; }
        }
        .correct-flash { animation: success-hit 0.5s ease-out; }
        @keyframes success-hit {
            0% { background-color: transparent; }
            50% { background-color: #dcfce7; }
            100% { background-color: transparent; }
        }
    </style>
</head>
<body>
    <div class="min-h-screen">
        <header class="md:hidden bg-white p-4 border-b border-gray-200 flex justify-between items-center sticky top-0 z-40">
            <div class="flex items-center">
                <i data-lucide="brain-circuit" class="h-8 w-8 text-purple-500"></i>
                <h1 class="ml-2 text-xl font-bold text-gray-800">Classroom Genie</h1>
            </div>
            <button id="menu-toggle-btn" class="p-2">
                <i data-lucide="menu" class="h-6 w-6"></i>
            </button>
        </header>

        <div class="md:flex">
            <aside id="sidebar" class="hidden md:flex w-full md:w-64 bg-white p-4 md:h-screen md:sticky top-0 border-r border-gray-200 print:hidden flex-col fixed inset-0 z-50 md:relative">
                <div class="hidden md:flex items-center mb-8">
                    <i data-lucide="brain-circuit" class="h-8 w-8 text-purple-500"></i>
                    <h1 class="ml-2 text-xl font-bold text-gray-800">Classroom Genie</h1>
                </div>
                <nav id="sidebar-nav" class="space-y-2"></nav>
                <div id="language-selector-wrapper" class="mt-auto pt-4 hidden">
                     <label for="language-select" class="block text-sm font-medium text-gray-700 mb-1">Language</label>
                     <select id="language-select" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500 bg-white">
                         <option value="US" selected>US English</option>
                         <option value="UK">UK English</option>
                     </select>
                </div>
            </aside>

            <main id="main-content" class="flex-1 p-4 md:p-8"></main>
        </div>
    </div>

    <script>
        // --- STATE MANAGEMENT ---
        const state = {
            activeTab: 'home',
            reportFileContent: '',
            language: 'US',
            uploadedImageBase64: null,
            currentTest: null // Stores questions/answers for interactive review

        const mainContent = document.getElementById('main-content');
        const sidebarNav = document.getElementById('sidebar-nav');
        const languageSelector = document.getElementById('language-selector-wrapper');

        // --- TEMPLATES ---
        const homePageTemplate = `
            <div class="max-w-4xl mx-auto text-center">
                 <div class="bg-white p-8 md:p-12 rounded-xl shadow-xl border-t-4 border-purple-500">
                    <i data-lucide="sparkles" class="mx-auto h-16 w-16 text-purple-400"></i>

        const parentHubTemplate = `

        const mathsHubTemplate = `

                            <select id="duration-select" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-purple-500 focus:border-purple-500 bg-white">
                                <option value="45" selected>45 minutes</option>
                                <option value="60">1 hour</option>
                                <option value="custom">Custom</option>
                            </select>
                        </div>
                        <div id="custom-duration-wrapper" class="hidden">
                            <label for="duration-custom" class="block text-sm font-medium text-gray-700 mb-1">Minutes</label>

        // --- RENDER & NAVIGATION ---
        function render() {
            const templates = {
                home: homePageTemplate,
                teacherHub: teacherHubTemplate,
                parentHub: parentHubTemplate,
                lessonPlanner: lessonPlannerTemplate,
                reportWriter: reportWriterTemplate,
                testCreator: testCreatorTemplate,
                homeworkHelper: homeworkHelperTemplate,
                learningHub: learningHubTemplate,
                mathsHub: mathsHubTemplate,
                explainSimply: explainSimplyTemplate,
            };
            mainContent.innerHTML = templates[state.activeTab] || homePageTemplate;
            updateSidebar();
            lucide.createIcons();
        }

        function updateSidebar() {
            const homeNav = `<button data-nav-link="home" class="nav-link flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg"><i data-lucide="home" class="h-5 w-5"></i><span class="ml-3">Home</span></button>`;

            const parentNav = `
                <button data-nav-link="parentHub" class="nav-link flex items-center w-full px-4 py-3 text-sm font-medium rounded-lg"><i data-lucide="users" class="h-5 w-5"></i><span class="ml-3">Parent & Learner</span></button>
                <button data-nav-link="homeworkHelper" class="nav-link flex items-center w-full pl-10 pr-4 py-2 text-sm font-medium rounded-lg"><i data-lucide="life-buoy" class="h-5 w-5"></i><span class="ml-3">Homework Helper</span></button>
                <button data-nav-link="learningHub" class="nav-link flex items-center w-full pl-10 pr-4 py-2 text-sm font-medium rounded-lg"><i data-lucide="book-marked" class="h-5 w-5"></i><span class="ml-3">Learning Hub</span></button>
                <button data-nav-link="mathsHub" class="nav-link flex items-center w-full pl-10 pr-4 py-2 text-sm font-medium rounded-lg"><i data-lucide="calculator" class="h-5 w-5"></i><span class="ml-3">Maths Master</span></button>
                <button data-nav-link="explainSimply" class="nav-link flex items-center w-full pl-10 pr-4 py-2 text-sm font-medium rounded-lg"><i data-lucide="baby" class="h-5 w-5"></i><span class="ml-3">Explain It Simply</span></button>
            `;

            const isTeacherTool = ['teacherHub', 'lessonPlanner', 'reportWriter', 'testCreator'].includes(state.activeTab);
            const isParentTool = ['parentHub', 'homeworkHelper', 'learningHub', 'mathsHub', 'explainSimply'].includes(state.activeTab);

            if (isTeacherTool) {
                sidebarNav.innerHTML = homeNav + teacherNav + parentNav;
                languageSelector.classList.remove('hidden');
            } else if (isParentTool) {
                sidebarNav.innerHTML = homeNav + teacherNav + parentNav;
                languageSelector.classList.add('hidden');
            } else {
                sidebarNav.innerHTML = teacherNav + parentNav;
                languageSelector.classList.add('hidden');
            }
            
            document.querySelectorAll('.nav-link').forEach(link => {
                const linkTab = link.dataset.navLink;
                const isActive = (linkTab === state.activeTab) || 
                                 (linkTab === 'teacherHub' && isTeacherTool) || 
                                 (linkTab === 'parentHub' && isParentTool);

                if (isActive) {
                    link.classList.add('bg-purple-600', 'text-white', 'shadow-md');
                    link.classList.remove('text-gray-600', 'hover:bg-gray-100');
                } else {
                    link.classList.remove('bg-purple-600', 'text-white', 'shadow-md');
                    link.classList.add('text-gray-600', 'hover:bg-gray-100');
                }
            });
        }
        
        // --- API & FUZZY REVIEW LOGIC ---
        async function fetchWithRetry(prompt, isJson, retries = 1, requestType = 'text', imageData = null) {
            try {
                const response = await fetch('/.netlify/functions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, isJson, requestType, imageData })
                });
                if (!response.ok) throw new Error(`API failed: ${response.status}`);
                const result = await response.json();
                const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!text) throw new Error("Empty AI response.");
                return text;
            } catch (error) {
                if (retries > 0) return fetchWithRetry(prompt, isJson, retries - 1, requestType, imageData);
                throw error;
            }
        }

        async function handleReviewAnswer(index, userAnswer, correctAnswer, questionText, buttonEl) {
            if (!userAnswer.trim()) return;
            
            buttonEl.disabled = true;
            buttonEl.innerHTML = `<span class="animate-spin mr-1">⌛</span>`;
            
            const prompt = `You are a fair teacher. Review this answer.
            Question: "${questionText}"
            Key: "${correctAnswer}"
            Student Answer: "${userAnswer}"
            
            If it's conceptually correct (ignore 'the', minor typos, or phrasing), mark as true.
            Return ONLY a JSON object: {"isCorrect": boolean, "feedback": "Short encouraging explanation"}`;

            try {
                const jsonText = await fetchWithRetry(prompt, true);
                const review = JSON.parse(jsonText);
                const feedbackDiv = document.getElementById(`feedback-${index}`);
                const inputArea = document.getElementById(`input-area-${index}`);

                if (review.isCorrect) {
                    inputArea.classList.add('correct-flash');
                    feedbackDiv.innerHTML = `<p class="text-green-600 font-bold mt-2">✅ Correct! ${review.feedback}</p>`;
                } else {
                    feedbackDiv.innerHTML = `<p class="text-red-500 font-bold mt-2">❌ Not quite. ${review.feedback}</p>`;
                }
            } catch (e) {
                console.error("Review failed", e);
            } finally {
                buttonEl.disabled = false;
                buttonEl.innerHTML = `<i data-lucide="check" class="w-4 h-4"></i>`;
                lucide.createIcons();
            }
        }

        // --- FEATURE HANDLERS ---
        async function handleGenerateMath() {
            const input = document.getElementById('math-input').value;
            const outputEl = document.getElementById('mh-output');
            const btn = document.getElementById('generate-math-btn');
            if (!input) return;

            btn.disabled = true;
            outputEl.innerHTML = `<div class="p-8 bg-white rounded-lg shadow text-center">Calculating with Python precision...</div>`;
            
            const prompt = `Solve this math problem. Use the code_execution tool (Python) to verify all calculations. Show your reasoning. Problem: ${input}`;

            try {
                const result = await fetchWithRetry(prompt, false);
                outputEl.innerHTML = `<div class="bg-white p-8 rounded-lg shadow-lg border-l-4 border-blue-600 prose max-w-none">${result.replace(/\n/g, '<br>')}</div>`;
            } catch (e) {
                document.getElementById('mh-error').classList.remove('hidden');
                document.getElementById('mh-error').textContent = e.message;
            } finally { btn.disabled = false; }
        }

        async function handleGenerateTest() {
            const topic = document.getElementById('test-topic').value;
            const num = document.getElementById('num-questions-select').value;
            const outputEl = document.getElementById('tc-output');
            if (!topic) return;

            outputEl.innerHTML = `<div class="p-8 bg-white rounded-lg shadow text-center">Creating your interactive test...</div>`;

            const prompt = `Create a test on ${topic} with ${num} questions. Include a mix of multiple choice and short answer. 
            Return JSON: {"questions": [{"id": 0, "text": "Question text", "type": "mcq/short", "options": ["A", "B"], "answer": "The key"} ]}`;

            try {
                const jsonText = await fetchWithRetry(prompt, true);
                state.currentTest = JSON.parse(jsonText).questions;
                
                let html = `<div class="space-y-6">`;
                state.currentTest.forEach((q, i) => {
                    html += `
                        <div id="input-area-${i}" class="bg-white p-6 rounded-lg shadow border border-gray-200 transition-all duration-300">
                            <p class="font-bold mb-3">${i+1}. ${q.text}</p>
                            <div class="flex space-x-2">
                                <input type="text" id="ans-${i}" class="flex-1 border p-2 rounded" placeholder="Your answer...">
                                <button onclick="checkTestAnswer(${i})" id="btn-${i}" class="bg-purple-600 text-white p-2 rounded hover:bg-purple-700">
                                    <i data-lucide="check" class="w-4 h-4"></i>
                                </button>
                            </div>
                            <div id="feedback-${i}"></div>
                        </div>`;
                });
                html += `</div>`;
                outputEl.innerHTML = html;
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        window.checkTestAnswer = (index) => {
            const q = state.currentTest[index];
            const userAns = document.getElementById(`ans-${index}`).value;
            const btn = document.getElementById(`btn-${index}`);
            handleReviewAnswer(index, userAns, q.answer, q.text, btn);
        };

        async function handleGenerateLearningHelp() {
            const topic = document.getElementById('learn-topic').value;
            const outputEl = document.getElementById('lh-output');
            if (!topic) return;

            outputEl.innerHTML = `<div class="text-center p-8 bg-white rounded shadow">Preparing your study guide...</div>`;

            const prompt = `Create a study guide for ${topic}. 
            Return JSON: {"notes": "Rich text summary", "questions": [{"text": "Question", "answer": "Answer"}]}`;

            try {
                const json = JSON.parse(await fetchWithRetry(prompt, true));
                state.currentTest = json.questions;
                
                let html = `<div class="bg-white p-8 rounded-lg shadow mb-8 prose max-w-none">
                    <h3 class="text-2xl font-bold mb-4">Revision Notes</h3>
                    ${json.notes.replace(/\n/g, '<br>')}
                </div>
                <h3 class="text-xl font-bold mb-4">Quick Practice</h3>`;

                json.questions.forEach((q, i) => {
                    html += `
                        <div id="input-area-${i}" class="bg-white p-6 rounded-lg shadow mb-4 border border-gray-100">
                            <p class="font-medium mb-2">${q.text}</p>
                            <div class="flex space-x-2">
                                <input type="text" id="ans-${i}" class="flex-1 border p-2 rounded text-sm">
                                <button onclick="checkTestAnswer(${i})" id="btn-${i}" class="bg-indigo-600 text-white px-3 rounded">Check</button>
                            </div>
                            <div id="feedback-${i}"></div>
                        </div>`;
                });
                outputEl.innerHTML = html;
            } catch (e) { console.error(e); }
        }

        // --- GLOBAL EVENT LISTENERS ---
        document.addEventListener('click', (e) => {
            const navLink = e.target.closest('[data-nav-link]');
            if (navLink) { 
                state.activeTab = navLink.dataset.navLink;
                render(); 
                return; 
            }
            if (e.target.id === 'generate-math-btn') handleGenerateMath();
            if (e.target.id === 'generate-test-btn') handleGenerateTest();
            if (e.target.id === 'generate-learning-help-btn') handleGenerateLearningHelp();
            if (e.target.id === 'generate-explanation-btn') handleGenerateExplanation(); // Simplified handler can be added similarly
        });

        // Initialize
        render();
    </script>
</body>
</html>
